[server]
bind = "0.0.0.0:8000"
name = "SSH MCP"
instructions = "Run commands on explicitly configured SSH targets. Use ssh_targets before ssh_run when target availability is uncertain."
# Browser-origin requests are denied unless their Origin exactly matches one
# of these values. Server-to-server MCP clients usually send no Origin header.
allowed_origins = []

[limits]
max_command_chars = 16384
max_output_bytes = 65536
max_timeout_seconds = 300
default_timeout_seconds = 60

[[targets]]
name = "example"
host = "203.0.113.10"
port = 22
user = "debian"
key_path = "/run/secrets/example_key"
known_hosts_path = "/run/secrets/known_hosts"
connect_timeout_seconds = 10
server_alive_interval_seconds = 10
server_alive_count_max = 2
